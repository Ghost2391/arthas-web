<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthas 远程诊断平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="brand">
        <span class="logo">A</span>
        <div>
            <h1>Arthas 远程诊断</h1>
            <span class="sub">Tunnel + LLM 对话式分析</span>
        </div>
    </div>
    <div class="header-actions">
        <button id="themeToggle" class="icon-btn" title="切换主题">🌙</button>
    </div>
</header>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-head">
            <span>服务器</span>
            <button id="addBtn" class="btn primary">+ 添加</button>
        </div>
        <div class="sidebar-search">
            <input id="serverSearch" type="text" placeholder="搜索服务器...">
            <span class="search-icon">🔍</span>
        </div>
        <ul id="serverList" class="server-list"></ul>
    </aside>
    <main class="content">
        <div id="empty" class="empty">
            <div class="empty-icon">⚡</div>
            <div class="empty-text">请选择左侧服务器</div>
            <div class="empty-sub">或点击 + 添加新服务器</div>
        </div>
        <div id="panel" class="panel hidden">
            <div class="panel-head">
                <div class="panel-info">
                    <strong id="panelName"></strong>
                    <span id="panelIp" class="muted"></span>
                    <span id="panelStatus" class="dot"></span>
                </div>
                <div class="tabs">
                    <button class="tab active" data-tab="chat">💬 对话</button>
                    <button class="tab" data-tab="info">🔗 连接</button>
                </div>
                <div class="panel-actions">
                    <button id="exportChatBtn" class="btn" title="导出对话">📥</button>
                    <button id="editBtn" class="btn">编辑</button>
                    <button id="deleteBtn" class="btn danger">删除</button>
                </div>
            </div>

            <section id="chatTab" class="tabpane active">
                <div id="chatLog" class="chat-log"></div>
                <div class="chat-settings">
                    <label class="setting-label"><span>模型</span>
                        <select id="modelSelect">
                        </select>
                    </label>
                    <label class="setting-label"><span>轮次</span><input id="maxRoundsInput" type="number" min="1" max="20" value="5"></label>
                    <label class="setting-label"><input id="thinkingToggle" type="checkbox"><span>思考</span></label>
                    <button id="clearChatBtn" class="btn setting-btn" title="清空对话">🗑 清空</button>
                </div>
                <div class="tool-strip">
                    <button class="tool-btn" data-tool="dashboard">dashboard</button>
                    <button class="tool-btn" data-tool="jvm">jvm</button>
                    <button class="tool-btn" data-tool="thread -n 3">thread</button>
                    <button class="tool-btn" data-tool="sysenv">sysenv</button>
                    <button class="tool-btn" data-tool="classloader">clsldr</button>
                    <button class="tool-btn" data-tool="sc -d com.demo.*">sc</button>
                    <button class="tool-btn" data-tool="sm com.demo.DemoController">sm</button>
                    <button class="tool-btn flame-btn" id="flameGraphBtn" title="仅支持 Linux/Mac">🔥</button>
                </div>
                <div class="chat-input">
                    <textarea id="chatText" placeholder="输入问题，或使用上方快捷工具一键诊断"></textarea>
                    <button id="chatSend" class="btn primary">发送</button>
                </div>
            </section>

            <section id="infoTab" class="tabpane">
                <h3>在远程容器中执行以下命令以接入 Arthas：</h3>
                <div class="pid-row">
                    <label>目标 Java 进程 PID</label>
                    <input id="pidInput" type="text" placeholder="容器内通常为 1" value="">
                </div>
                <pre id="attachCmd" class="code"></pre>
                <button id="copyCmd" class="btn">📋 复制命令</button>
                <p class="muted">agentId：<code id="agentIdText"></code></p>
            </section>
        </div>
    </main>
</div>

<div id="modal" class="modal hidden">
    <div class="modal-box">
        <h3 id="modalTitle">添加服务器</h3>
        <label>名称 <input id="f_name" placeholder="生产-订单服务"></label>
        <label>IP / 主机 <input id="f_ip" placeholder="10.0.0.1"></label>
        <label>Agent ID（留空自动生成） <input id="f_agent" placeholder="arthas-xxxx"></label>
        <label>备注 <input id="f_note" placeholder="可选"></label>
        <div class="modal-actions">
            <button id="modalCancel" class="btn">取消</button>
            <button id="modalSave" class="btn primary">保存</button>
        </div>
    </div>
</div>

<script src="lib/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
